<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>My Dashboard</title>
    <link rel="icon" href="data:image/x-icon;base64,iVBORw0KGgo=" />
    <style>
      .toolbar {
        position: absolute;
        top: 15px;
        right: 15px;
        display: flex;
        gap: 10px;
        z-index: 100;
      }

      .icon-btn {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        color: white;
        padding: 5px 8px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: rotate(180deg); /* 刷新图标转一下，细节感拉满 */
      }
      :root {
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
        --text-color: #ffffff;
      }

      body {
        margin: 0;
        padding: 20px;
        /* 模拟深色桌面背景，实际透明窗口会透出你的系统壁纸 */
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        /* height: 100vh; */
        display: flex;
        justify-content: center;
        align-items: flex-start; /* 改为顶部对齐，方便长内容增长 */
        font-family: 'Segoe UI', system-ui, sans-serif;
        overflow: hidden; /* 隐藏 body 的滚动条 */
      }

      .container {
        /* 移除固定的 max-height 和 max-width */
        width: 320px; /* 固定宽度，让内容向下延申 */
        min-height: 100px;
        max-height: 90vh; /* 最高不超过屏幕高度的 90% */

        padding: 30px;
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 24px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        text-align: center;

        /* 核心：内容过多时内部滚动 */
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        position: relative;
      }

      /* 隐藏滚动条但保留功能（可选，让界面更干净） */
      .container::-webkit-scrollbar {
        display: none;
      }

      h2 {
        font-weight: 300;
        color: var(--text-color);
        margin-bottom: 30px;
        letter-spacing: 1px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }

      .app-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 20px 10px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--text-color);
      }

      .app-card:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-5px);
        border-color: rgba(255, 255, 255, 0.3);
      }

      .icon {
        font-size: 28px;
        margin-bottom: 10px;
        filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.2));
      }

      .label {
        font-size: 13px;
        font-weight: 500;
        opacity: 0.9;
      }

      /* 状态指示灯 (用于你的 110 网段监控) */
      .status-dot {
        width: 8px;
        height: 8px;
        background: #4cd137;
        border-radius: 50%;
        margin-top: 5px;
        box-shadow: 0 0 8px #4cd137;
      }
      .footer {
        position: absolute;
        bottom: 15px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 1px;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .app-card {
        animation: fadeIn 0.4s ease forwards;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="drag-bar pywebview-drag-region" style="height: 40px; margin-top: -20px; cursor: move"></div>
      <div class="toolbar">
        <button class="icon-btn" onclick="handleRefresh()" title="刷新配置">🔄</button>
        <button class="icon-btn" onclick="pywebview.api.restart_app()" title="重启应用">⚡</button>
      </div>
      <h2>应用启动中心</h2>
      <div class="grid" id="app-grid"></div>
    </div>
    <div class="footer">
      <span id="app-version">Loading...</span>
    </div>
  </body>
  <script>
    window.addEventListener('pywebviewready', async () => {
      //   console.log('PyWebView Hello!')
      const apps = await pywebview.api.get_apps()
      const meta = await pywebview.api.get_env_info()
      const versionTag = document.getElementById('app-version')
      versionTag.innerText = `v${meta.version}`
      renderApps(apps)
    })

    function renderApps(apps) {
      //   console.log('准备调用 Python 接口启动: ' + apps)
      const grid = document.getElementById('app-grid')
      grid.innerHTML = apps
        .map(
          (app) => `
            <div class="app-card" onclick="pywebview.api.launch('${app.id}')">
                <div class="icon" style="filter: drop-shadow(0 2px 10px ${app.color}44)">
                    ${app.icon}
                </div>
                <div class="label">${app.title}</div>
            </div>
        `,
        )
        .join('')
      // 渲染完成后，计算高度并通知 Python 调整窗口
      setTimeout(() => {
        const height = document.querySelector('.container').offsetHeight + 40 // 加上边距
        // 注意：这需要你的 Api 类里有一个 resize_window 方法，或者直接使用 pywebview 内部指令
        // 如果不强求窗口变长，使用上面 CSS 的 overflow-y: auto 是最稳妥的
      }, 100)
    }

    async function handleRefresh() {
      // 1. 调用 Python 接口
      const response = await pywebview.api.refresh_config()

      if (response.status === 'success') {
        // 2. 重新调用之前的渲染函数
        renderApps(response.data)
        console.log('配置刷新成功！')
      } else {
        alert('配置读取失败: ' + response.message)
      }
    }
  </script>
</html>
