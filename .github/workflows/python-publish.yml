name: Build and Release EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'  # 打 tag 时创建 Release

permissions:
  contents: write  # 需要写入权限来创建 Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 uv
        run: |
          pip install uv
          uv sync

      - name: 构建 EXE
        run: |
          uv run python build_script.py

      - name: 上传 EXE 到 Release (仅 tag)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/MyLauncher.exe
          body: |
            ## 更新内容
            自动构建版本 ${{ github.ref_name }}

            ### 下载
            - MyLauncher.exe
          draft: false
          prerelease: false