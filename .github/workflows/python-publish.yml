name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的 tag 时触发 (如 v0.1.0)

permissions:
  contents: write  # 需要写入权限来创建 Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 uv
        run: |
          pip install uv
          uv sync

      - name: 构建 EXE
        run: |
          uv run python build_script.py

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/MyLauncher.exe
          body: |
            ## 更新内容
            自动构建版本 ${{ github.ref_name }}
            
            ### 下载
            - MyLauncher.exe
          draft: false
          prerelease: false